name: Owner App Build (iOS) - Hybrid Internal + External Testing Auto

on:
  repository_dispatch:
    types: [owner_app_build_ios]

concurrency:
  group: ios-${{ github.event.client_payload.CONFIG.OWNER_PROJECT_LINK_ID || github.event.client_payload.OWNER_PROJECT_LINK_ID || github.event.client_payload.ownerProjectLinkId || github.event.client_payload.CONFIG.ownerProjectLinkId || 'unknown' }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-15

    env:
      CI_CALLBACK_TOKEN: ${{ secrets.CI_CALLBACK_TOKEN }}
      CI_RUNTIME_TOKEN: ${{ secrets.CI_RUNTIME_TOKEN }}

      IOS_P12_B64: ${{ secrets.IOS_P12_B64 }}
      IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      IOS_EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD }}

      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8_B64: ${{ secrets.ASC_KEY_P8_B64 }}

      DEFAULT_BETA_APP_DESCRIPTION: ${{ secrets.DEFAULT_BETA_APP_DESCRIPTION }}
      DEFAULT_BETA_FEEDBACK_EMAIL: ${{ secrets.DEFAULT_BETA_FEEDBACK_EMAIL }}
      DEFAULT_BETA_CONTACT_PHONE: ${{ secrets.DEFAULT_BETA_CONTACT_PHONE }}

      SPACESHIP_CONNECT_API_IN_HOUSE: "false"
      COCOAPODS_DISABLE_STATS: "true"
      FASTLANE_OPT_OUT_USAGE: "true"
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest installed Xcode (safe)
        shell: bash
        run: |
          set -euo pipefail

          echo "🔎 Installed Xcodes:"
          ls -1 /Applications | grep -E '^Xcode.*\.app$' || true

          XCODE_APP="$(ls -1 /Applications | grep -E '^Xcode.*\.app$' | sort -V | tail -n 1)"

          if [ -z "${XCODE_APP:-}" ]; then
            echo "❌ No Xcode found in /Applications"
            exit 1
          fi

          echo "✅ Selected: $XCODE_APP"
          sudo xcode-select -s "/Applications/$XCODE_APP/Contents/Developer"

          xcodebuild -version
          echo "iOS SDK: $(xcrun --sdk iphoneos --show-sdk-version)"

      - name: Save client payload locally
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, pathlib
          event = json.load(open(os.environ["GITHUB_EVENT_PATH"], "r", encoding="utf-8"))
          payload = event.get("client_payload") or {}
          pathlib.Path("/tmp/client_payload.json").write_text(
              json.dumps(payload, ensure_ascii=False),
              encoding="utf-8"
          )
          print("✅ Saved /tmp/client_payload.json")
          PY

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      - name: Flutter pub get
        shell: bash
        run: |
          set -euo pipefail
          flutter --version
          flutter pub get

      - name: Show dispatch payload (debug)
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          payload = json.load(open("/tmp/client_payload.json", "r", encoding="utf-8")) or {}
          print(json.dumps(payload, ensure_ascii=False, indent=2))
          PY

      - name: Extract BUILD_ID and LINK_ID
        shell: bash
        run: |
          set -e
          python3 - <<'PY'
          import json, os
          payload = json.load(open("/tmp/client_payload.json", "r", encoding="utf-8")) or {}
          cfg = payload.get("CONFIG") or {}

          build_id = (
              (payload.get("BUILD_ID") or "")
              or (payload.get("buildId") or "")
              or ""
          ).strip()

          link_id = str(
              cfg.get("OWNER_PROJECT_LINK_ID")
              or payload.get("OWNER_PROJECT_LINK_ID")
              or payload.get("ownerProjectLinkId")
              or cfg.get("ownerProjectLinkId")
              or ""
          ).strip()

          api_base = (cfg.get("API_BASE_URL") or payload.get("API_BASE_URL") or "").strip().rstrip("/")

          open("ci_build_id.txt","w",encoding="utf-8").write(build_id)

          print("BUILD_ID =", build_id if build_id else "(empty)")
          print("LINK_ID (will be set by ci_env.json step) =", link_id if link_id else "(empty)")
          print("API_BASE (will be set by ci_env.json step) =", api_base if api_base else "(empty)")

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"BUILD_ID={build_id}\n")
          PY

      - name: Build ci_env.json (BY_LINK runtime-config + fallback + B64)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p lib/env

          python3 - <<'PY'
          import json, os, urllib.request, urllib.error, socket, re

          payload = json.load(open("/tmp/client_payload.json", "r", encoding="utf-8")) or {}
          cfg = payload.get("CONFIG") or {}

          api_base = (cfg.get("API_BASE_URL") or payload.get("API_BASE_URL") or "").strip().rstrip("/")

          link_id = str(
              cfg.get("OWNER_PROJECT_LINK_ID")
              or payload.get("OWNER_PROJECT_LINK_ID")
              or payload.get("ownerProjectLinkId")
              or cfg.get("ownerProjectLinkId")
              or ""
          ).strip()

          if not api_base:
              raise SystemExit("Missing API_BASE_URL")
          if not link_id:
              raise SystemExit("Missing OWNER_PROJECT_LINK_ID")

          url = f"{api_base}/api/public/runtime-config/by-link?linkId={link_id}"
          runtime = {}
          source = "FALLBACK (payload/defaults)"

          token = (os.getenv("CI_RUNTIME_TOKEN") or "").strip()
          headers = {"Accept": "application/json"}
          if token:
              headers["X-Auth-Token"] = token

          try:
              print("Fetching runtime config:", url)
              print("Auth header present =", "YES" if token else "NO")
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=12) as r:
                  raw = r.read().decode("utf-8")
                  runtime = json.loads(raw)
              source = "BY_LINK"
          except (urllib.error.HTTPError, urllib.error.URLError, socket.timeout, json.JSONDecodeError) as e:
              print("⚠️ runtime-config fetch failed, using fallback:", repr(e))

          print("CONFIG SOURCE =", source)

          def pick(key, default=None):
              v = runtime.get(key)
              if v not in (None, "", []):
                  return v
              v = cfg.get(key)
              if v not in (None, "", []):
                  return v
              v = payload.get(key)
              if v not in (None, "", []):
                  return v
              return default

          app_name = pick("APP_NAME", "My App")
          app_type = pick("APP_TYPE", "ECOMMERCE")
          project_id = str(pick("PROJECT_ID", "")).strip()

          ios_bundle = (
              pick("iosBundleId")
              or pick("IOS_BUNDLE_ID")
              or pick("PACKAGE_NAME")
              or pick("APPLICATION_ID")
              or ""
          ).strip()

          if not ios_bundle:
              ios_bundle = f"com.build4all.app{link_id}"

          ios_bundle = ios_bundle.lower()
          ios_bundle = re.sub(r"[^a-z0-9._]", "", ios_bundle)
          ios_bundle = re.sub(r"\.+", ".", ios_bundle).strip(".")

          if not ios_bundle or ios_bundle.count(".") < 1:
              ios_bundle = f"com.build4all.app{link_id}"

          vc = pick("IOS_BUILD_NUMBER") or pick("iosBuildNumber") or pick("ANDROID_VERSION_CODE")
          vn = pick("IOS_VERSION_NAME") or pick("iosVersionName") or pick("ANDROID_VERSION_NAME")

          try:
              vc_int = int(vc) if vc not in (None, "", []) else None
          except Exception:
              vc_int = None

          vn_str = (str(vn).strip() if vn not in (None, "", []) else "")

          env = {
              "API_BASE_URL": api_base,
              "APP_NAME": app_name,
              "APP_TYPE": app_type,
              "OWNER_PROJECT_LINK_ID": link_id,
              "PROJECT_ID": project_id,
              "IOS_BUNDLE_ID": ios_bundle,
              "IOS_BUILD_NUMBER": vc_int if vc_int is not None else 1,
              "IOS_VERSION_NAME": vn_str if vn_str else "1.0.0",
              "CONFIG_SOURCE": source,
          }

          currency_id = pick("CURRENCY_ID")
          if currency_id in (None, "", []):
              currency_id = (
                  runtime.get("currencyId")
                  or cfg.get("currencyId")
                  or payload.get("currencyId")
              )
          if currency_id not in (None, "", []):
              env["CURRENCY_ID"] = str(currency_id).strip()

          for key in [
              "THEME_JSON_B64",
              "NAV_JSON_B64",
              "HOME_JSON_B64",
              "ENABLED_FEATURES_JSON_B64",
              "BRANDING_JSON_B64",
          ]:
              v = pick(key)
              if v:
                  env[key] = v

          logo_url = (pick("LOGO_URL") or pick("LOGO_PATH") or "").strip()
          if not logo_url:
              logo_url = (runtime.get("logoUrl") or cfg.get("logoUrl") or payload.get("logoUrl") or "").strip()
          if logo_url:
              env["LOGO_URL"] = logo_url

          open("ci_api_base.txt", "w", encoding="utf-8").write(api_base)
          open("ci_link_id.txt", "w", encoding="utf-8").write(link_id)
          open("ci_ios_bundle_id.txt", "w", encoding="utf-8").write(ios_bundle)

          with open("lib/env/ci_env.json", "w", encoding="utf-8") as f:
              json.dump(env, f, ensure_ascii=False, indent=2)

          print("✅ ci_env.json written")
          print("API_BASE_URL =", api_base)
          print("OWNER_PROJECT_LINK_ID =", link_id)
          print("PROJECT_ID =", project_id)
          print("IOS_BUNDLE_ID =", ios_bundle)
          print("IOS_BUILD_NUMBER =", env["IOS_BUILD_NUMBER"])
          print("IOS_VERSION_NAME =", env["IOS_VERSION_NAME"])
          print("CURRENCY_ID =", env.get("CURRENCY_ID"))
          print("CONFIG_SOURCE =", source)
          print("LOGO_URL =", env.get("LOGO_URL"))

          for k in ["THEME_JSON_B64","NAV_JSON_B64","HOME_JSON_B64","ENABLED_FEATURES_JSON_B64","BRANDING_JSON_B64"]:
              print(k, "=", "YES" if env.get(k) else "NO")
          PY

      - name: 🔧 Sync menuType (BRANDING -> THEME) so drawer doesn't flip to bottom
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json, base64, pathlib

          p = pathlib.Path("lib/env/ci_env.json")
          env = json.loads(p.read_text(encoding="utf-8"))

          payload = json.load(open("/tmp/client_payload.json", "r", encoding="utf-8")) or {}
          cfg = payload.get("CONFIG") or {}

          def b64decode(s: str) -> str:
              s = (s or "").strip()
              if not s:
                  return ""
              return base64.b64decode(s + "==="[: (4 - len(s) % 4) % 4]).decode("utf-8", "replace")

          def b64encode(s: str) -> str:
              return base64.b64encode(s.encode("utf-8")).decode("utf-8")

          branding_b64 = (
              cfg.get("BRANDING_JSON_B64")
              or payload.get("BRANDING_JSON_B64")
              or env.get("BRANDING_JSON_B64")
              or ""
          ).strip()

          branding_json = (
              cfg.get("BRANDING_JSON")
              or payload.get("BRANDING_JSON")
              or env.get("BRANDING_JSON")
              or ""
          ).strip()

          branding = {}
          if branding_b64:
              try:
                  branding = json.loads(b64decode(branding_b64) or "{}")
              except Exception as e:
                  print("⚠️ Failed to parse BRANDING_JSON_B64:", e)
          elif branding_json:
              try:
                  branding = json.loads(branding_json)
              except Exception as e:
                  print("⚠️ Failed to parse BRANDING_JSON:", e)

          theme = {}
          if env.get("THEME_JSON_B64"):
              try:
                  theme = json.loads(b64decode(env["THEME_JSON_B64"]) or "{}")
              except Exception as e:
                  print("⚠️ Failed to parse THEME_JSON_B64:", e)
          elif env.get("THEME_JSON"):
              try:
                  theme = json.loads(env["THEME_JSON"] or "{}")
              except Exception as e:
                  print("⚠️ Failed to parse THEME_JSON:", e)

          menu = (branding.get("menuType") or "").strip().lower()
          if menu == "drawer":
              menu = "hamburger"

          if menu in ("hamburger", "bottom"):
              theme["menuType"] = menu
              theme_json = json.dumps(theme, separators=(",", ":"))
              env["THEME_JSON"] = theme_json
              env["THEME_JSON_B64"] = b64encode(theme_json)
              if branding_b64:
                  env["BRANDING_JSON_B64"] = branding_b64

          p.write_text(json.dumps(env, ensure_ascii=False, indent=2), encoding="utf-8")
          PY

      - name: 📡 Mark build RUNNING
        if: always()
        shell: bash
        run: |
          set +e
          API_BASE="$(cat ci_api_base.txt 2>/dev/null | tr -d '\r\n')"
          LINK_ID="$(cat ci_link_id.txt 2>/dev/null | tr -d '\r\n')"

          if [ -z "$API_BASE" ] || [ -z "$LINK_ID" ] || [ -z "${CI_CALLBACK_TOKEN:-}" ]; then
            exit 0
          fi

          if [ -z "${BUILD_ID:-}" ]; then
            exit 0
          fi

          curl -sS -X PUT "${API_BASE}/api/ci/build-jobs/running" \
            -H "Content-Type: application/json" \
            -H "X-Auth-Token: ${CI_CALLBACK_TOKEN}" \
            -d "{\"buildId\":\"${BUILD_ID}\",\"linkId\":\"${LINK_ID}\",\"platform\":\"IOS\"}" || true

      - name: 🔐 Create Demo Account for Apple Review (this app)
        shell: bash
        run: |
          set -euo pipefail

          API_BASE="$(cat ci_api_base.txt)"
          LINK_ID="$(cat ci_link_id.txt)"

          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            "$API_BASE/api/auth/demo/create-apple-review-account?ownerProjectLinkId=$LINK_ID" \
            -H "Content-Type: application/json" \
            -H "X-Auth-Token: ${{ secrets.CI_RUNTIME_TOKEN }}" \
            2>&1)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          DEMO_EMAIL=$(echo "$BODY" | python3 -c "
          import sys, json
          try:
              print(json.load(sys.stdin).get('email',''))
          except:
              print('')
          " 2>/dev/null || echo "")

          DEMO_PASSWORD=$(echo "$BODY" | python3 -c "
          import sys, json
          try:
              print(json.load(sys.stdin).get('password',''))
          except:
              print('')
          " 2>/dev/null || echo "")

          [ -n "$DEMO_EMAIL"    ] || DEMO_EMAIL="demo@applereview.com"
          [ -n "$DEMO_PASSWORD" ] || DEMO_PASSWORD="AppleReview2026!"

          echo "DEMO_EMAIL=$DEMO_EMAIL"       >> "$GITHUB_ENV"
          echo "DEMO_PASSWORD=$DEMO_PASSWORD" >> "$GITHUB_ENV"
          echo "::add-mask::$DEMO_PASSWORD"

      - name: 🔐 Seed Demo Account across all apps
        shell: bash
        run: |
          set -euo pipefail
          API_BASE="$(cat ci_api_base.txt)"
          curl -sS -X POST \
            "$API_BASE/api/auth/demo/seed-apple-review-account-all" \
            -H "Content-Type: application/json" \
            -H "X-Auth-Token: ${{ secrets.CI_RUNTIME_TOKEN }}" >/dev/null 2>&1 || true

      - name: Read App Store Connect metadata
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os
          payload = json.load(open("/tmp/client_payload.json", "r", encoding="utf-8")) or {}
          cfg = payload.get("CONFIG") or {}

          def pick(*keys):
            for k in keys:
              if k in payload and payload[k]:
                return payload[k]
              if k in cfg and cfg[k]:
                return cfg[k]
            return ""

          app_name = pick("APPLE_APP_NAME","appleAppName","appStoreAppName","ASC_APP_NAME")
          sku      = pick("APPLE_SKU","appleSku","appStoreSku","ASC_SKU")
          locale   = pick("APPLE_PRIMARY_LOCALE","applePrimaryLocale","primaryLocale","ASC_PRIMARY_LOCALE") or "en-US"

          beta_description = (
              pick("BETA_APP_DESCRIPTION","betaAppDescription")
              or os.environ.get("DEFAULT_BETA_APP_DESCRIPTION", "")
              or "Test our app and provide feedback on features, usability, and overall experience."
          )

          feedback_email = (
              pick("BETA_FEEDBACK_EMAIL","betaFeedbackEmail","ownerEmail")
              or os.environ.get("DEFAULT_BETA_FEEDBACK_EMAIL", "")
              or pick("ownerEmail")
              or ""
          )

          contact_phone = (
              pick("BETA_CONTACT_PHONE","betaContactPhone")
              or os.environ.get("DEFAULT_BETA_CONTACT_PHONE", "")
              or "+1234567890"
          )

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
            f.write(f"APPLE_APP_NAME={app_name}\n")
            f.write(f"APPLE_SKU={sku}\n")
            f.write(f"APPLE_PRIMARY_LOCALE={locale}\n")
            f.write(f"BETA_APP_DESCRIPTION={beta_description}\n")
            f.write(f"BETA_FEEDBACK_EMAIL={feedback_email}\n")
            f.write(f"BETA_CONTACT_PHONE={contact_phone}\n")
          PY

      - name: Ensure iOS Podfile exists
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "ios/Podfile" ]; then
            flutter create .
          fi

      - name: Set iOS version & build number (initial)
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, re
          cfg = json.load(open("lib/env/ci_env.json"))
          version_name = str(cfg.get("IOS_VERSION_NAME", "1.0.0")).strip()
          build_number = str(cfg.get("IOS_BUILD_NUMBER", 1)).strip()
          info_plist = "ios/Runner/Info.plist"
          with open(info_plist, "r", encoding="utf-8") as f:
              content = f.read()
          content = re.sub(r"(<key>CFBundleShortVersionString</key>\s*<string>)[^<]*(</string>)", rf"\g<1>{version_name}\g<2>", content)
          content = re.sub(r"(<key>CFBundleVersion</key>\s*<string>)[^<]*(</string>)", rf"\g<1>{build_number}\g<2>", content)
          with open(info_plist, "w", encoding="utf-8") as f:
              f.write(content)
          PY

      - name: Add privacy strings to Info.plist
        shell: bash
        run: |
          set -euo pipefail
          INFO_PLIST="ios/Runner/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'This app needs access to your photo library to allow you to select and upload images.'" "$INFO_PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'This app needs access to your photo library to allow you to select and upload images.'" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'This app needs access to your camera to allow you to take and upload photos.'" "$INFO_PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'This app needs access to your camera to allow you to take and upload photos.'" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'This app needs permission to save images to your photo library.'" "$INFO_PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryAddUsageDescription 'This app needs permission to save images to your photo library.'" "$INFO_PLIST"

      - name: Apply branding (logo + app name)
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, urllib.request, pathlib, shutil
          cfg = json.load(open("lib/env/ci_env.json","r",encoding="utf-8"))
          api_base = (cfg.get("API_BASE_URL") or "").strip().rstrip("/")
          logo_url = (cfg.get("LOGO_URL") or "").strip()
          pathlib.Path("assets/branding").mkdir(parents=True, exist_ok=True)
          if logo_url and logo_url.startswith("/") and api_base:
              logo_url = api_base + logo_url
          if logo_url:
              try:
                  urllib.request.urlretrieve(logo_url, "assets/branding/logo.png")
                  shutil.copyfile("assets/branding/logo.png","assets/branding/launcher.png")
                  shutil.copyfile("assets/branding/logo.png","assets/branding/splash.png")
              except Exception:
                  pass
          PY
          flutter pub get
          flutter pub run flutter_launcher_icons || true
          flutter pub run flutter_native_splash:create || true

      - name: Set iOS App Name in Info.plist
        shell: bash
        run: |
          set -euo pipefail
          INFO_PLIST="ios/Runner/Info.plist"
          APP_NAME=$(python3 -c "import json; print(json.load(open('lib/env/ci_env.json'))['APP_NAME'])")
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string '$APP_NAME'" "$INFO_PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName '$APP_NAME'" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName '$APP_NAME'" "$INFO_PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Add :CFBundleName string '$APP_NAME'" "$INFO_PLIST"

      - name: Setup iOS signing certificate
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="${GITHUB_WORKSPACE}/build.keychain"
          KEYCHAIN_PWD="ci_keychain_pwd_123"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"
          echo "$IOS_P12_B64" | tr -d '\n\r ' | base64 --decode > ios_cert.p12
          security import ios_cert.p12 -k "$KEYCHAIN_PATH" -P "$IOS_P12_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install fastlane + CocoaPods
        shell: bash
        run: |
          set -euo pipefail
          gem install fastlane -N --force
          gem install cocoapods -N
          gem install xcodeproj -N
          rm -rf ios/Pods
          rm -f ios/Podfile.lock
          cd ios
          pod install || { pod repo update; pod install; }

      - name: Create App Store Connect api_key.json
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .private
          echo "${ASC_KEY_P8_B64}" | base64 --decode > .private/AuthKey_${ASC_KEY_ID}.p8
          python3 - <<'PY'
          import json, pathlib, os
          key_path = pathlib.Path(f".private/AuthKey_{os.environ['ASC_KEY_ID']}.p8")
          p8_content = key_path.read_text(encoding='utf-8')
          api_key_data = {
            "key_id": os.environ["ASC_KEY_ID"].strip(),
            "issuer_id": os.environ["ASC_ISSUER_ID"].strip(),
            "key": p8_content,
            "in_house": False
          }
          pathlib.Path(".private/api_key.json").write_text(json.dumps(api_key_data, ensure_ascii=False, indent=2))
          PY

      - name: Install required Python packages
        shell: bash
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install PyJWT cryptography requests
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH

      - name: Auto-increment build number from App Store Connect
        shell: bash
        run: |
          set -euo pipefail
          API_KEY_JSON="$GITHUB_WORKSPACE/.private/api_key.json"
          BUNDLE_ID="$(tr -d '\r\n' < ci_ios_bundle_id.txt)"
          ENV_FILE="lib/env/ci_env.json"
          python3 - "$API_KEY_JSON" "$BUNDLE_ID" "$ENV_FILE" <<'PY'
          import json, jwt, time, requests, sys, re
          api_key  = json.load(open(sys.argv[1]))
          bundle   = sys.argv[2]
          env_path = sys.argv[3]
          def token():
              return jwt.encode({"iss": api_key["issuer_id"],"iat": int(time.time()),"exp": int(time.time()) + 600,"aud": "appstoreconnect-v1"}, api_key["key"], algorithm="ES256", headers={"kid": api_key["key_id"], "typ": "JWT"})
          def h():
              return {"Authorization": f"Bearer {token()}","Content-Type": "application/json"}
          r = requests.get(f"https://api.appstoreconnect.apple.com/v1/apps?filter[bundleId]={bundle}", headers=h())
          r.raise_for_status()
          apps = r.json()["data"]
          if not apps:
              fallback = int(time.time()) % 100000
              env = json.load(open(env_path))
              env["IOS_BUILD_NUMBER"] = fallback
              json.dump(env, open(env_path, "w"), indent=2)
              plist = "ios/Runner/Info.plist"
              content = open(plist).read()
              content = re.sub(r"(<key>CFBundleVersion</key>\s*<string>)[^<]*(</string>)", rf"\g<1>{fallback}\g<2>", content)
              open(plist, "w").write(content)
              sys.exit(0)
          app_id = apps[0]["id"]
          max_bn = 0
          next_url = f"https://api.appstoreconnect.apple.com/v1/builds?filter[app]={app_id}&limit=100&sort=-uploadedDate"
          pages = 0
          while next_url and pages < 5:
              r = requests.get(next_url, headers=h())
              r.raise_for_status()
              body = r.json()
              for b in body.get("data", []):
                  try:
                      val = int(b["attributes"]["buildNumber"])
                      if val > max_bn:
                          max_bn = val
                  except Exception:
                      pass
              next_url = body.get("links", {}).get("next")
              pages += 1
          import time as _t
          new_bn = (int(_t.time()) % 100000) if max_bn == 0 else max_bn + 1
          env = json.load(open(env_path))
          env["IOS_BUILD_NUMBER"] = new_bn
          json.dump(env, open(env_path, "w"), indent=2)
          plist = "ios/Runner/Info.plist"
          content = open(plist).read()
          content = re.sub(r"(<key>CFBundleVersion</key>\s*<string>)[^<]*(</string>)", rf"\g<1>{new_bn}\g<2>", content)
          open(plist, "w").write(content)
          PY

      - name: Sync Flutter version/build (pubspec + env vars)
        shell: bash
        run: |
          set -euo pipefail
          VN="$(python3 -c "import json; print(json.load(open('lib/env/ci_env.json'))['IOS_VERSION_NAME'])")"
          BN="$(python3 -c "import json; print(json.load(open('lib/env/ci_env.json'))['IOS_BUILD_NUMBER'])")"
          echo "IOS_VERSION_NAME=$VN" >> "$GITHUB_ENV"
          echo "IOS_BUILD_NUMBER=$BN" >> "$GITHUB_ENV"
          python3 - <<PY
          import re
          vn="$VN".strip()
          bn="$BN".strip()
          path="pubspec.yaml"
          s=open(path,"r",encoding="utf-8").read()
          if re.search(r"^version:\s*.+$", s, flags=re.M):
              s=re.sub(r"^version:\s*.+$", f"version: {vn}+{bn}", s, flags=re.M)
          else:
              s="version: "+f"{vn}+{bn}\n"+s
          open(path,"w",encoding="utf-8").write(s)
          PY

      - name: Setup Beta App Review Info with Demo Credentials
        shell: bash
        run: |
          set -euo pipefail
          API_KEY_JSON="$GITHUB_WORKSPACE/.private/api_key.json"
          BUNDLE_ID="$(tr -d '\r\n' < ci_ios_bundle_id.txt)"
          python3 - "$API_KEY_JSON" "$BUNDLE_ID" "${BETA_APP_DESCRIPTION}" "${BETA_FEEDBACK_EMAIL}" "${BETA_CONTACT_PHONE}" "$DEMO_EMAIL" "$DEMO_PASSWORD" <<'PYEOF'
          import json, jwt, time, requests, sys
          api_key = json.load(open(sys.argv[1]))
          def create_token():
              return jwt.encode({'iss': api_key['issuer_id'],'iat': int(time.time()),'exp': int(time.time()) + 1200,'aud': 'appstoreconnect-v1'}, api_key['key'], algorithm='ES256', headers={'kid': api_key['key_id'], 'typ': 'JWT'})
          def h():
              return {"Authorization": f"Bearer {create_token()}","Content-Type": "application/json"}
          bundle_id      = sys.argv[2]
          beta_desc      = sys.argv[3]
          feedback_email = sys.argv[4]
          contact_phone  = sys.argv[5]
          demo_email     = sys.argv[6]
          demo_password  = sys.argv[7]

          try:
              r = requests.get(f"https://api.appstoreconnect.apple.com/v1/apps?filter[bundleId]={bundle_id}", headers=h())
              r.raise_for_status()
              apps = r.json().get('data', [])
              if not apps:
                  print(f"⚠️ App not found for bundle {bundle_id} — skipping beta review setup (non-fatal)")
                  sys.exit(0)
              app_id = apps[0]['id']
              print(f"✅ App found: {app_id}")
          except Exception as e:
              print(f"⚠️ Could not fetch app: {e} — skipping beta review setup (non-fatal)")
              sys.exit(0)

          try:
              r = requests.get(f"https://api.appstoreconnect.apple.com/v1/betaAppLocalizations?filter[app]={app_id}&filter[locale]=en-US", headers=h())
              r.raise_for_status()
              localization_data = {"feedbackEmail": feedback_email, "description": beta_desc}
              existing = r.json().get('data', [])
              if existing:
                  loc_id = existing[0]['id']
                  requests.patch(f"https://api.appstoreconnect.apple.com/v1/betaAppLocalizations/{loc_id}", headers=h(), json={"data":{"type":"betaAppLocalizations","id":loc_id,"attributes":localization_data}})
                  print("✅ Beta localization updated")
              else:
                  requests.post("https://api.appstoreconnect.apple.com/v1/betaAppLocalizations", headers=h(), json={"data":{"type":"betaAppLocalizations","attributes":{"locale":"en-US",**localization_data},"relationships":{"app":{"data":{"type":"apps","id":app_id}}}}})
                  print("✅ Beta localization created")
          except Exception as e:
              print(f"⚠️ Beta localization error (non-fatal): {e}")

          try:
              r = requests.get(f"https://api.appstoreconnect.apple.com/v1/apps/{app_id}/betaAppReviewDetail", headers=h())
              email_name = feedback_email.split('@')[0] if '@' in feedback_email else "Beta"
              first_name = email_name.split('.')[0].capitalize() if '.' in email_name else email_name.capitalize()
              last_name  = email_name.split('.')[1].capitalize() if '.' in email_name and len(email_name.split('.')) > 1 else "Tester"
              review_data = {
                  "contactEmail": feedback_email,
                  "contactFirstName": first_name,
                  "contactLastName": last_name,
                  "contactPhone": contact_phone,
                  "demoAccountRequired": True,
                  "demoAccountName": demo_email,
                  "demoAccountPassword": demo_password
              }
              if r.status_code == 200:
                  detail_id = r.json()['data']['id']
                  requests.patch(f"https://api.appstoreconnect.apple.com/v1/betaAppReviewDetails/{detail_id}", headers=h(), json={"data":{"type":"betaAppReviewDetails","id":detail_id,"attributes":review_data}})
                  print("✅ Beta review details updated")
              else:
                  requests.post("https://api.appstoreconnect.apple.com/v1/betaAppReviewDetails", headers=h(), json={"data":{"type":"betaAppReviewDetails","attributes":review_data,"relationships":{"app":{"data":{"type":"apps","id":app_id}}}}})
                  print("✅ Beta review details created")
          except Exception as e:
              print(f"⚠️ Beta review detail error (non-fatal): {e}")
          PYEOF

      - name: Invite App Store Connect user (all apps access)
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, jwt, time, requests
          api_key = json.load(open(".private/api_key.json", encoding="utf-8"))
          payload_in = json.load(open("/tmp/client_payload.json", "r", encoding="utf-8")) or {}
          cfg = payload_in.get("CONFIG") or {}
          email = (cfg.get("ownerEmail") or payload_in.get("ownerEmail") or "").strip()
          full_name = (cfg.get("ownerName") or payload_in.get("ownerName") or "Owner User").strip()
          role = "DEVELOPER"
          if not email:
              raise SystemExit(0)
          parts = full_name.split()
          first_name = parts[0] if parts else "Owner"
          last_name = " ".join(parts[1:]) if len(parts) > 1 else "User"
          def token():
              return jwt.encode({"iss": api_key["issuer_id"],"iat": int(time.time()),"exp": int(time.time()) + 1200,"aud": "appstoreconnect-v1"}, api_key["key"], algorithm="ES256", headers={"kid": api_key["key_id"], "typ": "JWT"})
          headers = {"Authorization": f"Bearer {token()}","Content-Type": "application/json"}
          payload = {"data":{"type":"userInvitations","attributes":{"email": email,"firstName": first_name,"lastName": last_name,"roles": [role],"allAppsVisible": True}}}
          r = requests.post("https://api.appstoreconnect.apple.com/v1/userInvitations", headers=headers, json=payload)
          if r.status_code not in (200, 201, 409):
              raise Exception("Failed to invite user")
          PY

      - name: Ensure App ID exists
