      - name: Grant existing App Store Connect user access to this app
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, jwt, time, requests, pathlib, sys
          api_key = json.load(open(".private/api_key.json", encoding="utf-8"))
          payload = json.load(open("/tmp/client_payload.json", "r", encoding="utf-8")) or {}
          cfg = payload.get("CONFIG") or {}
          user_email = (cfg.get("ownerEmail") or payload.get("ownerEmail") or "").strip().lower()
          bundle_id = pathlib.Path("ci_ios_bundle_id.txt").read_text(encoding="utf-8").strip()
          if not user_email or not bundle_id:
              sys.exit(0)
          def token():
              return jwt.encode({"iss": api_key["issuer_id"],"iat": int(time.time()),"exp": int(time.time()) + 1200,"aud": "appstoreconnect-v1"}, api_key["key"], algorithm="ES256", headers={"kid": api_key["key_id"], "typ": "JWT"})
          def headers():
              return {"Authorization": f"Bearer {token()}","Content-Type": "application/json"}
          r = requests.get(f"https://api.appstoreconnect.apple.com/v1/apps?filter[bundleId]={bundle_id}", headers=headers(), timeout=30)
          r.raise_for_status()
          apps = r.json().get("data", [])
          if not apps:
              sys.exit(0)
          app_id = apps[0]["id"]
          user_id = None
          next_url = "https://api.appstoreconnect.apple.com/v1/users?limit=200"
          while next_url:
              r = requests.get(next_url, headers=headers(), timeout=30)
              r.raise_for_status()
              body = r.json()
              for user in body.get("data", []):
                  attrs = user.get("attributes", {})
                  if (attrs.get("email") or "").strip().lower() == user_email:
                      user_id = user["id"]
                      break
              if user_id:
                  break
              next_url = body.get("links", {}).get("next")
          if user_id:
              rel_payload = {"data":[{"type":"apps","id":app_id}]}
              r = requests.post(f"https://api.appstoreconnect.apple.com/v1/users/{user_id}/relationships/visibleApps", headers=headers(), json=rel_payload, timeout=30)
              if r.status_code not in (200, 201, 204, 409):
                  raise SystemExit("Failed to grant app access")
          PY

