name: build4all_wholesale_frontend
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
   

  flutter_localizations:
    sdk: flutter

  intl_phone_field: ^3.2.0

  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  go_router: ^16.2.0
  flutter_secure_storage: ^9.2.4
  get_it: ^8.2.0
  intl: ^0.20.2
  image_picker: ^1.1.2
  file_picker: 11.0.2
  excel: ^4.0.6
  archive: ^3.6.1
  flutter_stripe: ^11.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/branding/
    - assets/templates/supplier_import_template.xlsx

flutter_icons:
  android: true
  ios: true
  image_path: "assets/branding/launcher.png"
  adaptive_icon_background: "#FFFFFF"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/branding/splash.png
  android: true
  ios: true

  android_12:
    color: "#FFFFFF"
    image: assets/branding/splash.png
